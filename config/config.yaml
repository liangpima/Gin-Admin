server:
  port: 8080
  mode: debug
  read_timeout: 60
  write_timeout: 60

database:
  host: 127.0.0.1
  port: 3306
  username: gin
  password: "123456" # 生产环境使用 DB_PASSWORD 环境变量覆盖
  dbname: gin
  max_idle_conns: 5
  max_open_conns: 50
  conn_max_lifetime: 300
  conn_max_idle_time: 120

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: "change-me-in-production" # 生产环境使用 JWT_SECRET 环境变量覆盖
  access_expire: 7200
  refresh_expire: 604800

log:
  level: info
  filename: logs/app.log
  max_size: 200
  max_backups: 7
  max_age: 30
  compress: true

upload:
  save_path: uploads/
  max_size: 10
  allow_exts: .jpg,.jpeg,.png,.gif,.bmp,.svg,.webp,.mp4,.mov,.mp3,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.rar

casbin:
  model_path: config/casbin/model.conf

cors:
  allow_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"
    - "X-Tenant-Id"
  expose_headers:
    - "Content-Length"
    - "Content-Disposition"
  allow_credentials: true
