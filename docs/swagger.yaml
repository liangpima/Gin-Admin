                  $ref: '#/definitions/model.DashboardStats'
              type: object
      summary: 获取统计数据
      tags:
      - 仪表盘
  /api/v1/pay/notify/alipay:
    post:
      consumes:
      - application/x-www-form-urlencoded
      parameters:
      - description: 支付宝回调数据
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - text/plain
      responses:
        "200":
          description: success or fail
          schema:
            type: string
      summary: 支付宝回调
      tags:
      - 支付回调
  /api/v1/pay/notify/wechat:
    post:
      consumes:
      - application/json
      parameters:
      - description: 微信回调数据
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      summary: 微信支付回调
      tags:
      - 支付回调
  /api/v1/system/user:
    post:
      consumes:
