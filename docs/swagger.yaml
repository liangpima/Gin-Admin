basePath: /api/v1
definitions:
  common.PageData:
    properties:
      list: {}
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  common.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  dto.ChangePasswordRequest:
    properties:
      newPassword:
        maxLength: 128
        minLength: 6
        type: string
      oldPassword:
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  dto.CreateMemberLevelRequest:
    properties:
      discount:
        maximum: 10
        minimum: 1
        type: number
      icon:
        maxLength: 256
        type: string
      minPoints:
        type: integer
      name:
        maxLength: 64
        type: string
      sort:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - name
    type: object
  dto.CreateMemberRequest:
    properties:
      avatar:
        maxLength: 512
        type: string
      birthday:
        type: string
      gender:
        enum:
        - 0
        - 1
        - 2
        type: integer
      levelId:
        type: integer
      nickname:
        maxLength: 64
        type: string
      phone:
        type: string
      remark:
        maxLength: 500
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
      tagIds:
        items:
          type: integer
        type: array
      username:
        maxLength: 64
        type: string
    required:
    - phone
    type: object
  dto.CreateMemberTagRequest:
    properties:
      color:
        maxLength: 20
        type: string
      name:
        maxLength: 64
        type: string
      sort:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - name
    type: object
  dto.CreateUserRequest:
    properties:
      deptId:
        type: integer
      email:
        type: string
      nickname:
        maxLength: 64
        type: string
      password:
        maxLength: 128
        minLength: 6
        type: string
      phone:
        type: string
      postIds:
        items:
          type: integer
        type: array
      remark:
        maxLength: 500
        type: string
      roleIds:
        items:
          type: integer
        type: array
      status:
        enum:
        - 0
        - 1
        type: integer
      username:
        maxLength: 64
        minLength: 2
        type: string
    required:
    - deptId
    - password
    - username
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.ResetPasswordRequest:
    properties:
      id:
        type: integer
      password:
        maxLength: 128
        minLength: 6
        type: string
    required:
    - id
    - password
    type: object
  dto.StatusRequest:
    properties:
      id:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - id
    - status
    type: object
  dto.UpdateMemberLevelRequest:
    properties:
      discount:
        maximum: 10
        minimum: 1
        type: number
      icon:
        maxLength: 256
        type: string
      id:
        type: integer
      minPoints:
        type: integer
      name:
        maxLength: 64
        type: string
      sort:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - id
    - name
    type: object
  dto.UpdateMemberRequest:
    properties:
      avatar:
        maxLength: 512
        type: string
      birthday:
        type: string
      gender:
        enum:
        - 0
        - 1
        - 2
        type: integer
      id:
        type: integer
      levelId:
        type: integer
      nickname:
        maxLength: 64
        type: string
      phone:
        type: string
      remark:
        maxLength: 500
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
      tagIds:
        items:
          type: integer
        type: array
      username:
        maxLength: 64
        type: string
    required:
    - id
    type: object
  dto.UpdateMemberStatusRequest:
    properties:
      id:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - id
    type: object
  dto.UpdateMemberTagRequest:
    properties:
      color:
        maxLength: 20
        type: string
      id:
        type: integer
      name:
        maxLength: 64
        type: string
      sort:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - id
    - name
    type: object
  dto.UpdateMemberTagsRequest:
    properties:
      id:
        type: integer
      tagIds:
        items:
          type: integer
        type: array
    required:
    - id
    type: object
  dto.UpdateUserDeptRequest:
    properties:
      deptId:
        type: integer
      id:
        type: integer
    required:
    - deptId
    - id
    type: object
  dto.UpdateUserRequest:
    properties:
      deptId:
        type: integer
      email:
        type: string
      id:
        type: integer
      nickname:
        maxLength: 64
        type: string
      phone:
        type: string
      postIds:
        items:
          type: integer
        type: array
      remark:
        maxLength: 500
        type: string
      roleIds:
        items:
          type: integer
        type: array
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - id
    type: object
  dto.UpdateUserRolesRequest:
    properties:
      id:
        type: integer
      roleIds:
        items:
          type: integer
        type: array
    required:
    - id
    type: object
  model.DashboardStats:
    properties:
      configCount:
        type: integer
      deptCount:
        type: integer
      logCount:
        type: integer
      menuCount:
        type: integer
      postCount:
        type: integer
      roleCount:
        type: integer
      userCount:
        type: integer
    type: object
  vo.LoginResponse:
    properties:
      accessToken:
        type: string
      expiresIn:
        type: integer
      refreshToken:
        type: string
      tokenType:
        type: string
    type: object
  vo.MenuInfo:
    properties:
      children:
        items:
          $ref: '#/definitions/vo.MenuInfo'
        type: array
      component:
        type: string
      icon:
        type: string
      id:
        type: integer
      isCache:
        type: integer
      name:
        type: string
      parentId:
        type: integer
      path:
        type: string
      redirect:
        type: string
      sort:
        type: integer
      title:
        type: string
      type:
        type: integer
      visible:
        type: integer
    type: object
  vo.RoleInfo:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  vo.UserInfoResponse:
    properties:
      avatar:
        type: string
      buttons:
        items:
          type: string
        type: array
      email:
        type: string
      id:
        type: integer
      menus:
        items:
          $ref: '#/definitions/vo.MenuInfo'
        type: array
      nickname:
        type: string
      phone:
        type: string
      roles:
        items:
          $ref: '#/definitions/vo.RoleInfo'
        type: array
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Gin-Admin 后台管理系统 API 文档
  title: Gin-Admin API
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/vo.LoginResponse'
              type: object
      summary: 用户登录
      tags:
      - 认证
  /api/v1/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: 退出登录
      tags:
      - 认证
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: RefreshToken
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/vo.LoginResponse'
              type: object
      summary: 刷新Token
      tags:
      - 认证
  /api/v1/auth/userInfo:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
